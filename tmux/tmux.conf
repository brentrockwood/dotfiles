# Set status bar and panes to black on white
# set -g status-style fg=brightwhite,bg=black
# set -g pane-border-style fg=black,bg=default
# set -g pane-active-border-style fg=brightgreen,bg=default

# Active pane: white background, black text
# set -w -g window-active-style fg=black,bg=brightwhite
 
# Inactive panes: dimming (grey background)
# set -w -g window-style fg=colour240,bg=colour255

# Mouse support
set -g mouse on

# ─── Slate colorscheme (matches Neovim slate) ────────────────────────────────
# Palette:
#   bg-dark    #0f1e28   deep navy (borders, separators)
#   bg-mid     #1e2a35   main background
#   bg-panel   #1f3040   inactive panels / secondary segments
#   fg-dim     #7a9bb0   muted/inactive text
#   fg-main    #c0cfe0   primary text
#   accent     #4a9a8a   teal accent (active window, status ends)

# General
set -g status on
set -g status-interval 5
set -g status-position bottom

# Status bar background
set -g status-style "bg=#1e2a35 fg=#c0cfe0"

# ── Left: session name + cwd ──────────────────────────────────────────────────
set -g status-left-length 60
set -g status-left \
  "#[bg=#4a9a8a,fg=#0f1e28,bold] ❐ #S #[bg=#1f3040,fg=#0f1e28]#[bg=#1f3040,fg=#7a9bb0] ⌂ #{b:pane_current_path} #[bg=#1e2a35,fg=#1f3040]"

# ── Right: date/time + hostname ───────────────────────────────────────────────
set -g status-right-length 60
set -g status-right \
  "#[bg=#1e2a35,fg=#1f3040]#[bg=#1f3040,fg=#7a9bb0] %H:%M  %d %b #[bg=#1f3040,fg=#4a9a8a]#[bg=#4a9a8a,fg=#0f1e28,bold] #h "

# ── Windows ───────────────────────────────────────────────────────────────────
set -g window-status-style          "bg=#1f3040 fg=#7a9bb0"
set -g window-status-format         " #I: #W "
set -g window-status-current-style  "bg=#4a9a8a fg=#0f1e28 bold"
set -g window-status-current-format " #I: #W#{?window_zoomed_flag, ✦,} "
set -g window-status-separator      "#[bg=#1e2a35,fg=#0f1e28]│"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#1f3040"
set -g pane-active-border-style "fg=#4a9a8a"

# ── Command/message line ──────────────────────────────────────────────────────
set -g message-style        "bg=#1f3040 fg=#c0cfe0"
set -g message-command-style "bg=#1f3040 fg=#4a9a8a"

# ── Copy mode highlight ───────────────────────────────────────────────────────
set -g mode-style "bg=#4a9a8a fg=#0f1e28 bold"
