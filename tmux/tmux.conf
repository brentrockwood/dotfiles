# Set status bar and panes to black on white
# set -g status-style fg=brightwhite,bg=black
# set -g pane-border-style fg=black,bg=default
# set -g pane-active-border-style fg=brightgreen,bg=default

# Active pane: white background, black text
# set -w -g window-active-style fg=black,bg=brightwhite
 
# Inactive panes: dimming (grey background)
# set -w -g window-style fg=colour240,bg=colour255

# For pi
set -g extended-keys on
set -g extended-keys-format csi-u

# Mouse support
set -g mouse on

# Heavy borders make the active pane obvious in any program (nvim, shells, etc.)
set -g pane-border-lines heavy

# Terminal color support (true color for Neovim and themes)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape delay — critical for Neovim responsiveness
set -sg escape-time 0

# Window/pane numbering from 1 (more natural on keyboard)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Solarized colorscheme (matches system appearance) ───────────────────────
# Theme files live in ~/.config/tmux/ (symlinked via install.sh).
# On non-macOS (SSH, Linux): falls back to Solarized Dark.

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-left-length 60
set -g status-right-length 60

run-shell "~/.config/tmux/theme.sh"
set-hook -g client-focus-in "run-shell '~/.config/tmux/theme.sh'"

# ─── Keybindings ─────────────────────────────────────────────────────────────

# Splits: | for vertical, - for horizontal (stays in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane cycling (prefix + o / C-o, then keep pressing without prefix)
bind -r o select-pane -t :.+
# bind -r C-o rotate-window # Conflicts with nVim jump list

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ─── Copy mode (vi-style) ─────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── Session persistence (tmux-resurrect) ────────────────────────────────────
# Install TPM first: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I inside tmux to install plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'roosta/tmux-pop'
set -g @tmux-pop-color 'colour214'

# Vendored locally to avoid relying on TPM/network for install.
run-shell "~/src/dotfiles/tmux/plugins/aw-watcher-tmux/aw-watcher-tmux.tmux"
run '~/.tmux/plugins/tpm/tpm'
