# ─── Solarized Dark colorscheme ──────────────────────────────────────────────
# Palette:
#   base03  #002b36  darkest bg (borders, separators)
#   base02  #073642  dark bg (status bar, panels)
#   base01  #586e75  muted/inactive text
#   base0   #839496  primary text
#   base1   #93a1a1  emphasized secondary text
#   blue    #268bd2  accent (active window, highlights)
#   cyan    #2aa198  secondary accent

set -g status-style "bg=#073642 fg=#839496"

# ── Left: session name + cwd ──────────────────────────────────────────────────
set -g status-left-length 60
set -g status-left \
  "#[bg=#268bd2,fg=#002b36,bold] ❐ #S #[bg=#586e75,fg=#002b36]#[bg=#586e75,fg=#93a1a1] ⌂ #{b:pane_current_path} #[bg=#073642,fg=#586e75]"

# ── Right: date/time + hostname ───────────────────────────────────────────────
set -g status-right-length 60
set -g status-right \
  "#[bg=#073642,fg=#586e75]#[bg=#586e75,fg=#93a1a1] %H:%M  %d %b #[bg=#586e75,fg=#268bd2]#[bg=#268bd2,fg=#002b36,bold] #h "

# ── Windows ───────────────────────────────────────────────────────────────────
set -g window-status-style          "bg=#073642 fg=#586e75"
set -g window-status-format         " #I: #W "
set -g window-status-current-style  "bg=#268bd2 fg=#002b36 bold"
set -g window-status-current-format " #I: #W#{?window_zoomed_flag, ✦,} "
set -g window-status-separator      "#[bg=#073642,fg=#002b36]│"

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#073642"
set -g pane-active-border-style "fg=#268bd2"

# ── Command/message line ──────────────────────────────────────────────────────
set -g message-style         "bg=#073642 fg=#839496"
set -g message-command-style "bg=#073642 fg=#268bd2"

# ── Copy mode highlight ───────────────────────────────────────────────────────
set -g mode-style "bg=#268bd2 fg=#002b36 bold"
