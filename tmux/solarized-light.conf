# ─── Solarized Light colorscheme ─────────────────────────────────────────────
# Palette:
#   base3   #fdf6e3  lightest bg (status bar)
#   base2   #eee8d5  background highlights (panels)
#   base1   #93a1a1  comments / secondary text
#   base00  #657b83  primary body text
#   blue    #268bd2  accent (active window, highlights)
#   cyan    #2aa198  secondary accent

set -g status-style "bg=#eee8d5 fg=#657b83"

# ── Left: session name + cwd ──────────────────────────────────────────────────
set -g status-left-length 60
set -g status-left \
  "#[bg=#268bd2,fg=#fdf6e3,bold] ❐ #S #[bg=#93a1a1,fg=#eee8d5]#[bg=#93a1a1,fg=#fdf6e3] ⌂ #{b:pane_current_path} #[bg=#eee8d5,fg=#93a1a1]"

# ── Right: date/time + hostname ───────────────────────────────────────────────
set -g status-right-length 60
set -g status-right \
  "#[bg=#eee8d5,fg=#93a1a1]#[bg=#93a1a1,fg=#fdf6e3] %H:%M  %d %b #[bg=#93a1a1,fg=#268bd2]#[bg=#268bd2,fg=#fdf6e3,bold] #h "

# ── Windows ───────────────────────────────────────────────────────────────────
set -g window-status-style          "bg=#eee8d5 fg=#93a1a1"
set -g window-status-format         " #I: #W "
set -g window-status-current-style  "bg=#268bd2 fg=#fdf6e3 bold"
set -g window-status-current-format " #I: #W#{?window_zoomed_flag, ✦,} "
set -g window-status-separator      "#[bg=#eee8d5,fg=#93a1a1]│"

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=#93a1a1"
set -g pane-active-border-style "fg=#b58900"

# ── Command/message line ──────────────────────────────────────────────────────
set -g message-style         "bg=#eee8d5 fg=#657b83"
set -g message-command-style "bg=#eee8d5 fg=#268bd2"

# ── Copy mode highlight ───────────────────────────────────────────────────────
set -g mode-style "bg=#268bd2 fg=#fdf6e3 bold"
